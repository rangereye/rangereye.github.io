      <h1>RangerEye: Autonomous Wildfire Detection Drone</h1>
      <p>RangerEye is an autonomous wildfire detection drone developed as a Florida Institute of Technology senior design project (2023-2025) by Onat Cakici, John Munday, Manuel Villamor, Mitchell Lacle, Yuto Imai, Otto Dorschner, Abdulrahman Almutairi, Abdullah Alaskar, and Ishaben Trada. The hybrid fixed-wing VTOL drone carries a thermal imaging payload, flies for 120 minutes per charge, and recharges autonomously at a solar-powered dock for continuous wildfire surveillance.</p>
